<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帰省予定共有アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🏠 帰省予定一覧</h1>
    </header>

    <main>
        <!-- 予定カード（今はダミーデータで見た目だけ確認） -->
        <section class="schedule-list">
            <div class="schedule-card">
                <div class="schedule-header">
                    <span class="member-name">太郎さん</span>
                    <span class="arrival-info">8/13(木) 15:30</span>
                </div>
                <div class="station">📍 〇〇駅</div>
                <div class="memo">スーツケース大きめ持参</div>

                <div class="pickup-section">
                    <div class="response-list">
                        <span class="response-tag">母：行けるよ</span>
                    </div>
                    <button class="pickup-button">迎えに行けるよ</button>
                </div>
            </div>
        </section>

        <button class="add-button">＋ 新しい予定を登録</button>
    </main>
</body>
</html>
