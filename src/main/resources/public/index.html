<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帰省予定共有アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🏠 帰省予定一覧</h1>
    </header>

    <main>
        <section class="schedule-list">
            <!-- ここにJavaScriptが自動でカードを差し込みます -->
        </section>

        <button id="add-button" class="add-button">＋ 新しい予定を登録</button>

        <!-- 登録フォーム（最初は非表示） -->
        <form id="schedule-form" class="schedule-form hidden">
            <h2>新しい予定を登録</h2>

            <label>
                お名前
                <input type="text" id="input-member-name" required>
            </label>

            <label>
                到着日
                <input type="date" id="input-arrival-date" required>
            </label>

            <label>
                到着時刻
                <input type="time" id="input-arrival-time" required>
            </label>

            <label>
                駅・場所
                <input type="text" id="input-station" required>
            </label>

            <label>
                メモ（任意）
                <textarea id="input-memo"></textarea>
            </label>

            <div class="form-buttons">
                <button type="submit" class="submit-button">登録する</button>
                <button type="button" id="cancel-button" class="cancel-button">キャンセル</button>
            </div>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
