<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帰省予定共有アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="start-overlay" class="start-overlay">
        <button id="start-button" class="start-button">🎵 タップして開始</button>
    </div>

    <header>
        <h1>🏠 帰省予定一覧</h1>
        <button id="bgm-toggle" class="bgm-toggle-button">🔊</button>
    </header>

    <main>
        <section class="schedule-list">
            <!-- ここにJavaScriptが自動でカードを差し込みます -->
        </section>

        <button id="add-button" class="add-button">＋ 新しい予定を登録</button>

        <!-- 登録フォーム（最初は非表示） -->
        <form id="schedule-form" class="schedule-form hidden">
            <h2>新しい予定を登録</h2>

            <label>
                お名前
                <select id="input-member-name" required>
                    <option value="" disabled selected>選択してください</option>
                </select>
            </label>

            <label>
                到着日
                <input type="date" id="input-arrival-date" required>
            </label>

            <label>
                到着時刻
                <input type="time" id="input-arrival-time" required>
            </label>

            <label>
                駅・場所
                <select id="input-station-select" required>
                    <option value="" disabled selected>選択してください</option>
                    <option value="自宅">自宅</option>
                    <option value="相生山駅">相生山駅</option>
                    <option value="植田駅">植田駅</option>
                    <option value="その他">その他（自由入力）</option>
                </select>
                <input type="text" id="input-station-other" class="hidden station-other-input"
                    placeholder="場所を入力してください">
            </label>

            <label>
                夜ごはん
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="dinner-status" value="家で食べたい🍙">
                        🏠 家で食べたい
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="dinner-status" value="外で食べてくる">
                        🍽️ 外で食べてくる
                    </label>
                </div>
            </label>

            <label>
                メモ（任意）
                <textarea id="input-memo"></textarea>
            </label>

            <div class="form-buttons">
                <button type="submit" class="submit-button">登録する</button>
                <button type="button" id="cancel-button" class="cancel-button">キャンセル</button>
            </div>
        </form>

        <!-- 予定登録完了時の表示（最初は非表示） -->
        <div id="schedule-registered-panel" class="schedule-form hidden">
            <p class="pickup-thanks-message">✅ 帰省予定を登録しました</p>
        </div>

    </main>


    <audio id="bgm" src="sounds/bgm.mp3" loop></audio>
    <audio id="decision" src="sounds/decision.mp3"></audio>
    <audio id="select" src="sounds/select.mp3"></audio>

    <script src="script.js"></script>
</body>
